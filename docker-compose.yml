services:
  fleet-planner-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: fleet-planner-frankenphp:latest
    container_name: fleet-planner-app
    restart: unless-stopped
    depends_on:
      fleet-planner-mysql:
        condition: service_healthy
    environment:
      APP_NAME: ${APP_NAME:-Fleet Planner}
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Makassar}
      APP_URL: ${APP_URL:-https://fleet.nusantaraabadijaya.com}
      APP_LOCALE: ${APP_LOCALE:-id}
      APP_FALLBACK_LOCALE: ${APP_FALLBACK_LOCALE:-en}
      APP_FAKER_LOCALE: ${APP_FAKER_LOCALE:-id_ID}
      APP_MAINTENANCE_DRIVER: ${APP_MAINTENANCE_DRIVER:-file}
      LOG_CHANNEL: ${LOG_CHANNEL:-stack}
      LOG_STACK: ${LOG_STACK:-single}
      LOG_DEPRECATIONS_CHANNEL: ${LOG_DEPRECATIONS_CHANNEL:-null}
      LOG_LEVEL: ${LOG_LEVEL:-warning}
      DB_CONNECTION: ${DB_CONNECTION:-mysql}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_CHARSET: ${DB_CHARSET:-utf8mb4}
      DB_COLLATION: ${DB_COLLATION:-utf8mb4_unicode_ci}
      MYSQL_ATTR_SSL_CA: ${MYSQL_ATTR_SSL_CA:-}
      CACHE_STORE: ${CACHE_STORE:-database}
      CACHE_PREFIX: ${CACHE_PREFIX:-fleet_planner_cache}
      SESSION_DRIVER: ${SESSION_DRIVER:-database}
      SESSION_LIFETIME: ${SESSION_LIFETIME:-120}
      SESSION_ENCRYPT: ${SESSION_ENCRYPT:-false}
      SESSION_PATH: ${SESSION_PATH:-/}
      SESSION_DOMAIN: ${SESSION_DOMAIN:-.nusantaraabadijaya.com}
      SESSION_SECURE_COOKIE: ${SESSION_SECURE_COOKIE:-true}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
      BROADCAST_CONNECTION: ${BROADCAST_CONNECTION:-log}
      FILESYSTEM_DISK: ${FILESYSTEM_DISK:-local}
      MAIL_MAILER: ${MAIL_MAILER:-log}
      MAIL_HOST: ${MAIL_HOST:-127.0.0.1}
      MAIL_PORT: ${MAIL_PORT:-2525}
      MAIL_USERNAME: ${MAIL_USERNAME:-null}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-null}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@nusantaraabadijaya.com}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Fleet Planner}
      VITE_APP_NAME: ${VITE_APP_NAME:-Fleet Planner}
      SERVER_NAME: :8080
      FRANKENPHP_CONFIG: ""
    volumes:
      - fleet_planner_storage:/app/storage
      - fleet_planner_cache:/app/bootstrap/cache
    labels:
      - traefik.enable=true
      - traefik.docker.network=workspace_local-dev
      - traefik.http.routers.fleet-planner.rule=Host(`fleet.nusantaraabadijaya.com`)
      - traefik.http.routers.fleet-planner.entrypoints=websecure
      - traefik.http.routers.fleet-planner.tls=true
      - traefik.http.routers.fleet-planner.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}
      - traefik.http.services.fleet-planner.loadbalancer.server.port=8080
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:8080/up || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - fleet-planner-internal
      - workspace_local-dev

  fleet-planner-mysql:
    image: mysql:8.4
    container_name: fleet-planner-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - fleet_planner_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - fleet-planner-internal

volumes:
  fleet_planner_storage:
  fleet_planner_cache:
  fleet_planner_mysql_data:

networks:
  fleet-planner-internal:
    driver: bridge
  workspace_local-dev:
    external: true
